# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # Set this to your desired Ruby version
          bundler-cache: true
      - name: Install Jekyll and dependencies
        run: |
          gem install bundler
          bundle install
      - name: Install Python dependencies
        run: |
          python -m venv venv  # Create virtual environment
          source venv/bin/activate  # Activate the virtual environment
          pip install -r requirements.txt  # Install Python packages

      - name: Build registered projects
        run: |
          make build-registered-projects  # Distribute all registered project files to Jekyll locations
          make build-registered-docs  # Distribute all registered documentation files to Jekyll locations  

      - name: Verify registered docs output
        run: |
          if [ -d "_posts/projects" ]; then
            DOC_COUNT=$(find _posts/projects -type f -name '*.md' | wc -l | tr -d ' ')
            echo "Registered project docs found: ${DOC_COUNT}"
            if [ "${DOC_COUNT}" -gt 0 ]; then
              echo "Sample generated docs:"
              find _posts/projects -type f -name '*.md' | sort | head -20
            else
              echo "No markdown docs found under _posts/projects"
            fi
          else
            echo "_posts/projects directory not found"
          fi

      - name: Execute notebook conversion script
        run: |
          source venv/bin/activate  # Activate virtual environment
          python scripts/convert_notebooks.py  # Run notebook conversion
          
      - name: Execute DOCX conversion script
        run: |
          source venv/bin/activate  # Activate virtual environment
          if [ -d "_docx" ] && [ "$(ls -A _docx 2>/dev/null)" ]; then
            echo "Converting DOCX files..."
            python scripts/convert_docx.py  # Run DOCX conversion
          else
            echo "No DOCX files found, skipping conversion"
          fi

      - name: Split multi-course files
        run: |
          source venv/bin/activate  # Activate virtual environment
          python scripts/split_multi_course_files.py  # Run course splitting
      - name: Compute and apply baseurl
        run: |
          REPO="${{ github.repository }}"
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          NAME=$(echo "$REPO" | cut -d'/' -f2)

          # Check if custom domain is configured via CNAME file
          if [ -f "CNAME" ]; then
            BASEURL=""
            echo "Custom domain detected (CNAME file exists), using empty baseurl"
          elif [[ "$NAME" == "$OWNER.github.io" ]]; then
            BASEURL=""
          elif [[ "${{ github.repository }}" = "Open-Coding-Society/pages" ]]; then
            BASEURL=""
          else
            BASEURL="/$NAME"
          fi

          echo "baseurl: \"$BASEURL\"" > _config.override.yml

      - name: Build with Jekyll
        run: |
          bundle exec jekyll build --config _config.yml,_config.override.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  # Deployment job
  deploy:
    environment:
      name: github-pages-deployment
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5